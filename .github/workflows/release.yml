name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  dmg:
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
      APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
      APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "LITESHOT_VERSION=$version" >> "$GITHUB_ENV"
          echo "LITESHOT_BUILD=$GITHUB_RUN_NUMBER" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        if: env.APPLE_CERTIFICATE_P12_BASE64 != ''
        run: |
          keychain="$RUNNER_TEMP/liteshot-signing.keychain-db"
          keychain_password="$(uuidgen)"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/developer-id.p12"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$RUNNER_TEMP/developer-id.p12" \
            -k "$keychain" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain"
          echo "CODESIGN_IDENTITY=$APPLE_CODESIGN_IDENTITY" >> "$GITHUB_ENV"

      - name: Build DMG
        run: |
          Scripts/package_dmg.sh
          codesign --verify --deep --strict --verbose=2 build/LiteShot.app
          ls -lh dist

      - name: Notarize and staple DMG
        if: env.APPLE_NOTARY_KEY_ID != '' && env.APPLE_NOTARY_ISSUER_ID != '' && env.APPLE_NOTARY_KEY_P8_BASE64 != ''
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          echo "$APPLE_NOTARY_KEY_P8_BASE64" | base64 --decode > "$key_path"
          dmg_path="$(ls dist/*.dmg | head -n 1)"
          xcrun notarytool submit "$dmg_path" \
            --key "$key_path" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --wait
          xcrun stapler staple "$dmg_path"
          spctl --assess --type open --context context:primary-signature --verbose "$dmg_path"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          dmg_path="$(ls dist/*.dmg | head -n 1)"
          notes_file="$RUNNER_TEMP/release-notes.md"
          if [[ -n "$APPLE_CERTIFICATE_P12_BASE64" && -n "$APPLE_NOTARY_KEY_ID" && -n "$APPLE_NOTARY_ISSUER_ID" && -n "$APPLE_NOTARY_KEY_P8_BASE64" ]]; then
            printf '%s\n\n%s\n' \
              "Automated macOS DMG build for $GITHUB_REF_NAME." \
              "This build is Developer ID signed and notarized." > "$notes_file"
          else
            printf '%s\n\n%s\n\n%s\n\n%s\n%s\n%s\n' \
              "Automated macOS DMG build for $GITHUB_REF_NAME." \
              "This build is ad-hoc signed and not notarized. macOS Gatekeeper may block the first launch after download." \
              "If you trust this build, open it with Right Click -> Open. For personal use, you can also remove the quarantine flag:" \
              '```bash' \
              'xattr -dr com.apple.quarantine /Applications/LiteShot.app' \
              '```' > "$notes_file"
          fi
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --notes-file "$notes_file"
            gh release upload "$GITHUB_REF_NAME" "$dmg_path" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$dmg_path" \
              --title "LiteShot $GITHUB_REF_NAME" \
              --notes-file "$notes_file"
          fi
